<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canlı Mesaj Panosu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sayfa">
    <header class="baslik">
      <h1>Canlı Mesaj Panosu</h1>
      <p class="alt-baslik">Mesajını yaz, herkes görsün.</p>
    </header>

    <main>
      <form id="mesaj-formu" class="kart form-kart" novalidate>
        <label class="etiket" for="isimInput">İsim</label>
        <input
          type="text"
          id="isimInput"
          name="isim"
          class="girdi"
          placeholder="Adın veya takma adın"
          autocomplete="nickname"
          maxlength="80"
          required
        />

        <label class="etiket" for="mesajInput">Mesaj</label>
        <textarea
          id="mesajInput"
          name="mesaj"
          class="girdi girdi-metin"
          placeholder="Mesajını buraya yaz..."
          rows="3"
          maxlength="500"
          required
        ></textarea>

        <button type="button" id="gonderBtn" class="gonder-btn">Gönder</button>
      </form>

      <section class="kart liste-kart" aria-labelledby="mesajlar-baslik">
        <h2 id="mesajlar-baslik" class="liste-baslik">Mesajlar</h2>
        <div id="mesajlar-alani" class="mesajlar-alani"></div>
      </section>

      <section class="kart gelistiren-kart" aria-labelledby="gelistiren-baslik">
        <h2 id="gelistiren-baslik" class="liste-baslik">Bunu Geliştiren</h2>
        <p><strong>İsim:</strong> Sami Eren Akman</p>
        <div class="sosyal-linkler" aria-label="Sosyal bağlantılar">
          <a href="https://github.com/SeAkman0" target="_blank" rel="noopener noreferrer" class="ikon-link" title="GitHub">
            <span aria-hidden="true">🐙</span>
            <span>GitHub</span>
          </a>
          <a href="https://www.linkedin.com/in/sami-eren-akman-559561299/" target="_blank" rel="noopener noreferrer" class="ikon-link" title="LinkedIn">
            <span aria-hidden="true">💼</span>
            <span>LinkedIn</span>
          </a>
          <a href="https://samieren.tech" target="_blank" rel="noopener noreferrer" class="ikon-link" title="Web Sitesi">
            <span aria-hidden="true">🌐</span>
            <span>Web</span>
          </a>
        </div>
        <p class="danisman"><strong>Teknik Danışman:</strong> Doç. Dr. Barış Çukurbaşı</p>
        <p class="danisman-site">xrlab.mcbu.edu.tr</p>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
